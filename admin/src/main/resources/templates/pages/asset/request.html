<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">

    <!-- 검색조건 헤더 -->
    <div class="page-header">
        <h4 class="page-title">
            <i class="bi bi-exclamation-circle-fill text-danger"></i>
            검색조건
        </h4>
    </div>

    <!-- 검색 영역 -->
    <div th:replace="~{pages/asset/request-search :: search}"></div>

    <!-- 리스트 헤더 + 툴바 -->
    <div class="page-header mt-3">
        <h4 class="page-title">
            <i class="bi bi-exclamation-circle-fill text-danger"></i>
            내 이미지 목록
        </h4>
    </div>

    <!-- 테이블 -->
    <div th:replace="~{pages/asset/request-table :: table}"></div>

    <!-- 페이지네이션 -->
    <div th:replace="~{fragments/page-content-layout :: pagination}"></div>

    <!-- 스크립트 -->
    <th:block th:replace="~{pages/asset/request-script :: script}"/>

</div>
</body>
</html>
