<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="script">
<script th:inline="javascript">
/*<![CDATA[*/
    window.HAS_CMS_WRITE = /*[[${userAuthorities != null && userAuthorities.contains('CMS:W')}]]*/ false;
/*]]>*/
</script>
<script>
    window.CmsAssetApprovalPage = {
        currentPage: 1,
        totalItems: 0,
        itemsPerPage: 10,
        sortBy: null,
        sortDirection: null,
        categoryOptionsLoaded: false,
        categoryMap: { COMMON: '공통', CARD: '카드', LOAN: '여신', DEPOSIT: '수신' },
        PLACEHOLDER_SRC: '/images/asset-placeholder.svg',

        STATE_BADGE: {
            WORK: '<span class="badge bg-secondary">작업중</span>',
            PENDING: '<span class="badge bg-warning text-dark">승인대기</span>',
            APPROVED: '<span class="badge bg-success">승인완료</span>',
            REJECTED: '<span class="badge bg-danger">반려</span>',
        },

        load: function(page) {
            if (page !== undefined) this.currentPage = page;
            const params = new URLSearchParams({
                page: this.currentPage,
                size: this.itemsPerPage,
                assetState: $('#filterAssetState').val(),
                uploaderId: $('#filterUploaderId').val().trim(),
                businessCategory: ($('#filterBusinessCategory').val() || '').trim(),
                search: $('#filterSearch').val().trim(),
                startDate: $('#filterStartDate').val(),
                endDate: $('#filterEndDate').val(),
            });
            if (this.sortBy) {
                params.append('sortBy', this.sortBy);
                params.append('sortDirection', this.sortDirection);
            }

            fetch('/api/cms-admin/asset-approvals?' + params)
                .then(r => r.json())
                .then(res => {
                    if (!res.success) { Toast.error(res.message); return; }
                    const pageData = res.data;
                    this.totalItems = pageData.totalElements;
                    this.renderTable(pageData.content);
                    this.renderPagination();
                    this.updateSortIndicators();
                })
                .catch(() => Toast.error('목록 조회 중 오류가 발생했습니다.'));
        },

        loadCategories: function() {
            if (this.categoryOptionsLoaded) return Promise.resolve();

            return fetch('/api/cms-admin/asset-categories')
                .then(r => r.json())
                .then(res => {
                    if (!res.success || !Array.isArray(res.data)) return;

                    const searchSelect = $('#filterBusinessCategory');
                    searchSelect.find('option:not(:first)').remove();

                    res.data.forEach(item => {
                        this.categoryMap[item.code] = item.codeName;
                        searchSelect.append(`<option value="${HtmlUtils.escape(item.code)}">${HtmlUtils.escape(item.codeName)}</option>`);
                    });

                    this.categoryOptionsLoaded = true;
                })
                .catch(() => {});
        },

        attachSortHandlers: function() {
            $('#assetApprovalTable thead th[data-sort]').addClass('sortable cursor-pointer');
            $(document)
                .off('click.cmsAssetApprovalSort', '#assetApprovalTable thead th[data-sort]')
                .on('click.cmsAssetApprovalSort', '#assetApprovalTable thead th[data-sort]', function() {
                    const sortKey = $(this).data('sort');
                    if (!sortKey) return;

                    if (CmsAssetApprovalPage.sortBy === sortKey) {
                        if (CmsAssetApprovalPage.sortDirection === 'ASC') {
                            CmsAssetApprovalPage.sortDirection = 'DESC';
                        } else {
                            CmsAssetApprovalPage.sortBy = null;
                            CmsAssetApprovalPage.sortDirection = null;
                        }
                    } else {
                        CmsAssetApprovalPage.sortBy = sortKey;
                        CmsAssetApprovalPage.sortDirection = 'ASC';
                    }

                    CmsAssetApprovalPage.updateSortIndicators();
                    CmsAssetApprovalPage.load(1);
                });
        },

        updateSortIndicators: function() {
            const headers = $('#assetApprovalTable thead th.sortable');
            headers.removeClass('sort-asc sort-desc');
            if (!this.sortBy || !this.sortDirection) return;

            headers.filter(`[data-sort="${this.sortBy}"]`)
                .addClass(this.sortDirection === 'ASC' ? 'sort-asc' : 'sort-desc');
        },

        renderTable: function(rows) {
            const $tbody = $('#assetApprovalTableBody');
            if (!rows || rows.length === 0) {
                $tbody.html('<tr><td colspan="8" class="text-center py-4 text-body-secondary">조회된 데이터가 없습니다.</td></tr>');
                return;
            }

            const html = rows.map(row => {
                const badge = this.STATE_BADGE[row.assetState] || HtmlUtils.escape(row.assetState || '');
                const aid = HtmlUtils.escape(row.assetId);
                const fileSize = this._formatFileSize(row.fileSize);
                const categoryName = row.businessCategoryName || this.categoryMap[row.businessCategory] || row.businessCategory || '-';

                const tdApproval = (window.HAS_CMS_WRITE && row.assetState === 'PENDING')
                    ? `<div class="d-flex flex-column gap-1">
                           <button class="btn btn-success btn-xs" onclick="CmsAssetApprovalPage.approve('${aid}')">승인</button>
                           <button class="btn btn-danger btn-xs" onclick="CmsAssetApprovalPage.openRejectModal('${aid}')">반려</button>
                       </div>`
                    : '-';

                return `<tr>
                    <td class="text-center">
                        <img src="${this.PLACEHOLDER_SRC}" alt="placeholder" class="asset-thumb"
                             style="width:48px;height:48px;object-fit:cover;border-radius:4px;cursor:pointer;"
                             onclick="CmsAssetApprovalPage.openPreview('${aid}')"
                             onerror="this.src='${this.PLACEHOLDER_SRC}'"/>
                    </td>
                    <td>
                        <span class="clickable-cell" onclick="CmsAssetApprovalPage.openPreview('${aid}')" title="상세">
                            ${HtmlUtils.escape(row.assetName || '')}
                        </span>
                    </td>
                    <td>${HtmlUtils.escape(row.createUserName || '')}</td>
                    <td>${HtmlUtils.escape(categoryName)}</td>
                    <td class="small">
                        <div>${HtmlUtils.escape(row.mimeType || '-')}</div>
                        <div class="text-body-secondary">${fileSize}</div>
                    </td>
                    <td class="text-center">${badge}</td>
                    <td class="text-center small">${HtmlUtils.escape(row.createDate || '-')}</td>
                    <td class="text-center">${tdApproval}</td>
                </tr>`;
            }).join('');

            $tbody.html(html);
        },

        renderPagination: function() {
            const totalPages = Math.ceil(this.totalItems / this.itemsPerPage);
            const pagination = $('#pagination');
            pagination.empty();

            pagination.append(`
                <li class="page-item ${this.currentPage === 1 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="CmsAssetApprovalPage.changePage(1); return false;"><i class="bi bi-chevron-double-left"></i></a>
                </li>
                <li class="page-item ${this.currentPage === 1 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="CmsAssetApprovalPage.changePage(${this.currentPage - 1}); return false;"><i class="bi bi-chevron-left"></i></a>
                </li>
            `);

            const maxButtons = 5;
            let startPage = Math.max(1, this.currentPage - Math.floor(maxButtons / 2));
            let endPage = Math.min(totalPages, startPage + maxButtons - 1);
            if (endPage - startPage + 1 < maxButtons) {
                startPage = Math.max(1, endPage - maxButtons + 1);
            }

            for (let i = startPage; i <= endPage; i++) {
                pagination.append(`
                    <li class="page-item ${i === this.currentPage ? 'active' : ''}">
                        <a class="page-link" href="#" onclick="CmsAssetApprovalPage.changePage(${i}); return false;">${i}</a>
                    </li>
                `);
            }

            pagination.append(`
                <li class="page-item ${this.currentPage === totalPages || totalPages === 0 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="CmsAssetApprovalPage.changePage(${this.currentPage + 1}); return false;"><i class="bi bi-chevron-right"></i></a>
                </li>
                <li class="page-item ${this.currentPage === totalPages || totalPages === 0 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="CmsAssetApprovalPage.changePage(${totalPages}); return false;"><i class="bi bi-chevron-double-right"></i></a>
                </li>
            `);

            const start = this.totalItems === 0 ? 0 : (this.currentPage - 1) * this.itemsPerPage + 1;
            const end = Math.min(this.currentPage * this.itemsPerPage, this.totalItems);
            $('#pageInfo').text(`${start} - ${end} of ${this.totalItems} items`);
        },

        changePage: function(page) {
            const totalPages = Math.ceil(this.totalItems / this.itemsPerPage);
            if (page < 1 || page > totalPages) return;
            this.currentPage = page;
            this.load();
        },

        reset: function() {
            $('#filterAssetState').val('');
            $('#filterUploaderId').val('');
            $('#filterBusinessCategory').val('');
            $('#filterSearch').val('');
            $('#filterStartDate').val('');
            $('#filterEndDate').val('');
            this.sortBy = null;
            this.sortDirection = null;
            this.updateSortIndicators();
            this.itemsPerPage = parseInt($('#limitRows').val()) || 10;
            this.load(1);
        },

        openPreview: function(assetId) {
            $('#previewAssetName').text('-');
            $('#previewBusinessCategory').text('-');
            $('#previewMimeType').text('-');
            $('#previewFileSize').text('-');
            $('#previewAssetDesc').text('-');
            $('#previewAssetState').text('-');
            $('#previewCreateUser').text('-');
            $('#previewCreateDate').text('-');
            $('#previewImg').attr('src', this.PLACEHOLDER_SRC);

            new bootstrap.Modal('#assetPreviewModal').show();

            fetch(`/api/cms-admin/asset-approvals/${encodeURIComponent(assetId)}`)
                .then(r => r.json())
                .then(res => {
                    if (!res.success || !res.data) { Toast.error(res.message || '상세 조회 실패'); return; }
                    const d = res.data;
                    $('#previewAssetName').text(d.assetName || '-');
                    $('#previewBusinessCategory').text(d.businessCategoryName || this.categoryMap[d.businessCategory] || d.businessCategory || '-');
                    $('#previewMimeType').text(d.mimeType || '-');
                    $('#previewFileSize').text(this._formatFileSize(d.fileSize));
                    $('#previewAssetDesc').text(d.assetDesc || '-');
                    $('#previewAssetState').html(this.STATE_BADGE[d.assetState] || HtmlUtils.escape(d.assetState || ''));
                    $('#previewCreateUser').text((d.createUserName || '-') + ' (' + (d.createUserId || '-') + ')');
                    $('#previewCreateDate').text(d.createDate || '-');
                })
                .catch(() => Toast.error('상세 조회 중 오류가 발생했습니다.'));
        },

        approve: function(assetId) {
            if (!confirm('해당 이미지를 승인하시겠습니까?')) return;

            LoadingOverlay.show('승인 처리 중...');

            fetch(`/api/cms-admin/asset-approvals/${encodeURIComponent(assetId)}/approve`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
            })
                .then(r => r.json())
                .then(res => {
                    if (res.success) { Toast.success(res.message); this.load(); }
                    else { Toast.error(res.message); }
                })
                .catch(() => Toast.error('승인 처리 중 오류가 발생했습니다.'))
                .finally(() => LoadingOverlay.hide());
        },

        openRejectModal: function(assetId) {
            $('#rejectAssetId').val(assetId);
            $('#rejectReason').val('');
            new bootstrap.Modal('#assetRejectModal').show();
        },

        _submitReject: function() {
            const assetId = $('#rejectAssetId').val();
            const rejectedReason = $('#rejectReason').val().trim();

            fetch(`/api/cms-admin/asset-approvals/${encodeURIComponent(assetId)}/reject`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ rejectedReason }),
            })
                .then(r => r.json())
                .then(res => {
                    bootstrap.Modal.getInstance('#assetRejectModal').hide();
                    if (res.success) { Toast.success(res.message); this.load(); }
                    else { Toast.error(res.message); }
                })
                .catch(() => Toast.error('반려 처리 중 오류가 발생했습니다.'));
        },

        _formatFileSize: function(bytes) {
            if (bytes == null) return '-';
            const units = ['B', 'KB', 'MB', 'GB'];
            let idx = 0;
            let value = bytes;
            while (value >= 1024 && idx < units.length - 1) {
                value /= 1024;
                idx++;
            }
            return value.toFixed(idx === 0 ? 0 : 1) + ' ' + units[idx];
        },
    };

    $(document).ready(function() {
        CmsAssetApprovalPage.itemsPerPage = parseInt($('#limitRows').val()) || 10;
        CmsAssetApprovalPage.attachSortHandlers();
        CmsAssetApprovalPage.loadCategories().finally(() => CmsAssetApprovalPage.load(1));

        $('#limitRows').on('change', function() {
            CmsAssetApprovalPage.itemsPerPage = parseInt($(this).val()) || 10;
            CmsAssetApprovalPage.load(1);
        });

        $('#btnRejectConfirm').on('click', function() { CmsAssetApprovalPage._submitReject(); });
    });
</script>
</th:block>
</body>
</html>
