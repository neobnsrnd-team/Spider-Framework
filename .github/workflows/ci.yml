name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'html-cms/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'html-cms/**'

# PRм—җ н…ҢмҠӨнҠё кІ°кіј мҪ”л©ҳнҠё/мІҙнҒ¬ кІҢмӢңм—җ н•„мҡ”н•ң к¶Ңн•ң
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # Job 1: Spring Build + Unit Tests
  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin   # pom.xml, mvnw мң„м№ҳ

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install spider-link to local Maven repository
        run: mvn -B install -DskipTests --file ../spider-link/pom.xml

      - name: Build with Maven
        run: mvn -B compile --file pom.xml

      - name: Check code formatting (Spotless)
        run: mvn -B spotless:check --file pom.xml

      - name: Run Spring unit tests (with JaCoCo)
        run: mvn -B test --file pom.xml

      - name: Package application
        run: mvn -B package -DskipTests --file pom.xml

      - name: Publish build test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: admin/target/surefire-reports/*.xml
          check_name: "Build вҖ” Unit Tests"

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: admin/target/*.jar
          retention-days: 1

  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # Job 2: Playwright E2E Tests (Oracle container)
  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # gvenzl/setup-oracle-free action:
  #   - м„ңл№„мҠӨ м»Ён…Ңмқҙл„Ҳ лҢҖл№„ 3мҙҲ к°„кІ© healthcheck (vs GHA 10мҙҲ+)
  #   - volume mountлЎң init мҠӨнҒ¬лҰҪнҠё м§Ғм ‘ мӢӨн–ү (docker cp мҡ°нҡҢ л¶Ҳн•„мҡ”)
  #   - лЎңм»¬ e2e/docker/ мҷҖ лҸҷмқјн•ң init-oracle.sh + SQL нҢҢмқј мӮ¬мҡ©
  playwright:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: admin   # package.json, e2e/, docs/ мң„м№ҳ

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: admin/target/

      # init-oracle.sh(GRANT + SQL мӢӨн–ү) + SQL нҢҢмқјмқ„ н•ң л””л үнҶ лҰ¬м—җ лӘЁм•„ startup-scriptsлЎң м „лӢ¬
      # SQL нҢҢмқјмқҖ .data нҷ•мһҘмһҗлЎң ліөмӮ¬ вҶ’ entrypointмқҳ SYS мһҗлҸҷ мӢӨн–ү л°©м§Җ, init-oracle.shк°Җ APP_USERлЎң мӢӨн–ү
      - name: Prepare Oracle init scripts
        run: |
          mkdir -p /tmp/oracle-init
          cp e2e/docker/init-oracle.sh /tmp/oracle-init/01_init.sh
          chmod +x /tmp/oracle-init/01_init.sh
          cp docs/sql/oracle/01_create_tables.sql /tmp/oracle-init/02_create_tables.data
          cp docs/sql/oracle/03_insert_initial_data.sql /tmp/oracle-init/03_insert_data.data
          cp e2e/docker/e2e-seed.sql /tmp/oracle-init/04_e2e_seed.data

      - name: Setup Oracle Database
        uses: gvenzl/setup-oracle-free@v1
        with:
          app-user: spider
          app-user-password: spider1234
          oracle-password: test1234
          tag: 23-slim-faststart
          container-runtime: docker
          startup-scripts: /tmp/oracle-init

      # Spring BootлҠ” JAR мӢӨн–ү л””л үн„°лҰ¬мқҳ application.ymlмқ„ нҒҙлһҳмҠӨнҢЁмҠӨліҙлӢӨ мҡ°м„  лЎңл“ңн•ңлӢӨ.
      # 'ci' н”„лЎңнҢҢмқј нҷңм„ұнҷ” вҶ’ classpathмқҳ application-ci.yml(Oracle м„Өм •)кіј лі‘н•©лҗңлӢӨ.
      - name: Write application.yml to working directory
        run: |
          printf '%s\n' \
            'spring:' \
            '  profiles:' \
            '    active: ci' \
            '  thymeleaf:' \
            '    cache: false' \
            '    prefix: classpath:/templates/' \
            '    suffix: .html' \
            '    encoding: UTF-8' \
            '    mode: HTML' \
            'server:' \
            '  port: 8080' \
            'logging:' \
            '  level:' \
            '    root: WARN' \
            '    com.example.admin_demo: INFO' \
            'file:' \
            '  upload-dir: /tmp/uploads' \
            'xml-property:' \
            '  directory: /tmp/xml-properties' \
            'scheduling:' \
            '  batch-his-cleanup:' \
            '    enabled: false' \
            > application.yml

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Start Spring Boot application
        run: java -jar target/*.jar > /tmp/spring-app.log 2>&1 &

      - name: Wait for server to be ready
        run: |
          echo "Waiting for Spring Boot to start..."
          for i in $(seq 1 24); do
            sleep 5
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/login 2>/dev/null || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ]; then
              echo "Server is UP!"
              exit 0
            fi
          done
          echo "Server did not start in time. Last log:"
          tail -50 /tmp/spring-app.log
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('admin/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright browser deps (cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright E2E tests
        run: npx playwright test --project=auth-setup --project=smoke --project=api --project=pages

      - name: Publish Playwright test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: admin/playwright-results/results.xml
          check_name: "Playwright вҖ” E2E Tests"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: admin/playwright-report/
          retention-days: 7

      - name: Upload Spring Boot log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-log-playwright
          path: /tmp/spring-app.log
          retention-days: 3

  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # Job 3: Code Quality (SonarCloud + ESLint)
  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  code-quality:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: admin   # pom.xml, package.json мң„м№ҳ

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarCloudм—җ н•„мҡ”н•ң м „мІҙ нһҲмҠӨнҶ лҰ¬

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install spider-link to local Maven repository
        run: mvn -B install -DskipTests --file ../spider-link/pom.xml

      - name: Build and generate JaCoCo report
        run: mvn -B test jacoco:report --file pom.xml

      - name: SonarCloud analysis (main branch)
        if: github.event_name == 'push' && env.SONAR_TOKEN != ''
        run: >
          mvn -B sonar:sonar
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.organization=neobnsrnd-team
          -Dsonar.projectKey=neobnsrnd-team_spider-admin
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
          --file pom.xml
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SonarCloud analysis (PR)
        if: github.event_name == 'pull_request' && env.SONAR_TOKEN != ''
        run: >
          mvn -B sonar:sonar
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.organization=neobnsrnd-team
          -Dsonar.projectKey=neobnsrnd-team_spider-admin
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
          -Dsonar.pullrequest.key=${{ github.event.pull_request.number }}
          -Dsonar.pullrequest.branch=${{ github.head_ref }}
          -Dsonar.pullrequest.base=${{ github.base_ref }}
          --file pom.xml
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
