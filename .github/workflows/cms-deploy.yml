name: CMS Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'html-cms/**'
  workflow_dispatch:

env:
  IMAGE_NAME: springware-cms

jobs:
  # ── Job 1: Lint & Build ──────────────────────────────────────────────────────
  ci:
    name: Lint & Build
    runs-on: self-hosted
    defaults:
      run:
        working-directory: html-cms

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 의존성 설치
        run: npm ci

      - name: Prettier 포맷 검사
        run: npm run format:check

      - name: ESLint 검사
        run: npm run lint

      - name: 빌드 검사
        run: npm run build

  # ── Job 2: Docker 이미지 빌드 & 푸시 ────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: self-hosted
    needs: ci

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker 메타데이터 추출
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Docker 이미지 빌드 및 푸시
        uses: docker/build-push-action@v6
        with:
          context: ./html-cms
          file: ./html-cms/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: 서버 배포 ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: self-hosted
    needs: docker

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 설정 파일 복사
        run: |
          mkdir -p /app
          cp html-cms/docker-compose-prod.yml /app/docker-compose-prod.yml
          cp html-cms/nginx/nginx.conf /app/nginx.conf

      - name: Nginx 설정 적용
        run: |
          sudo cp /app/nginx.conf /etc/nginx/sites-available/springware
          sudo ln -sf /etc/nginx/sites-available/springware /etc/nginx/sites-enabled/springware
          sudo nginx -t
          sudo systemctl reload nginx

      - name: Docker 이미지 Pull
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      - name: 컨테이너 재시작
        run: |
          cd /app
          DOCKER_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest \
          docker compose -f docker-compose-prod.yml up -d --force-recreate cms operation
          docker compose -f docker-compose-prod.yml ps

      - name: 헬스체크
        run: |
          echo "앱 기동 대기 (15초)..."
          sleep 15

          check_health() {
            local NAME=$1
            local PORT=$2
            for i in $(seq 1 6); do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:${PORT}/cms/api/health" || true)
              if [ "$HTTP_CODE" = "200" ]; then
                echo "[${NAME}] 헬스체크 통과 (HTTP 200)"
                return 0
              fi
              echo "시도 $i/6: [${NAME}] HTTP ${HTTP_CODE}, 10초 후 재시도..."
              sleep 10
            done
            echo "[${NAME}] 헬스체크 실패"
            return 1
          }

          check_health "cms" 3000
          check_health "operation" 3001

      - name: 이미지 정리
        if: always()
        run: docker image prune -af || true

      - name: 배포 요약
        if: always()
        run: |
          echo "## CMS 배포 요약" >> "$GITHUB_STEP_SUMMARY"
          echo "| 항목 | 값 |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 이미지 | \`${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 상태 | \`${{ job.status }}\` |" >> "$GITHUB_STEP_SUMMARY"
